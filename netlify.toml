# Netlify Configuration for Ma'aser Tracker
# Automatic deployments: main branch → production, PRs → preview

[build]
  # Build command
  command = "npm run build"

  # Output directory (Vite builds to 'dist')
  publish = "dist"

  # Build environment variables
  [build.environment]
    NODE_VERSION = "20"

# Redirect rules for SPA (Single Page Application)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Headers for security and caching
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/service-worker.js"
  [headers.values]
    Cache-Control = "no-cache"

# Deploy previews for all PRs
[context.deploy-preview]
  command = "npm run build"

# Production branch
[context.production]
  command = "npm run build"
