name: CI

on:
  pull_request:
    branches: [develop]

permissions:
  contents: write
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - name: Lint
        run: npm run lint
      - name: Unit tests
        run: npm test
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
      - name: Build
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}

  preview:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci
      - name: Build for preview
        run: npm run build
        env:
          BASE_URL: /${{ github.event.repository.name }}/pr-${{ github.event.number }}/
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
      - name: Deploy to GH Pages subfolder
        run: |
          PR_NUM=${{ github.event.number }}

          # Save build output before switching branches
          cp -r dist /tmp/preview-build

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git fetch origin gh-pages || true

          if git rev-parse --verify origin/gh-pages >/dev/null 2>&1; then
            git checkout gh-pages
          else
            git checkout --orphan gh-pages
            git rm -rf .
            # Initialize with redirect to Firebase production
            cat > index.html << 'REDIRECT_EOF'
          <!DOCTYPE html>
          <html>
          <head>
            <meta http-equiv="refresh" content="0; url=https://maaser-tracker-335aa.web.app/">
            <title>Redirecting...</title>
          </head>
          <body>
            <p>Redirecting to <a href="https://maaser-tracker-335aa.web.app/">Ma'aser Tracker</a>...</p>
          </body>
          </html>
          REDIRECT_EOF
            touch .nojekyll
            git add index.html .nojekyll
          fi

          # Ensure root redirect exists (idempotent)
          if [ ! -f index.html ] || ! grep -q "maaser-tracker-335aa.web.app" index.html 2>/dev/null; then
            cat > index.html << 'REDIRECT_EOF'
          <!DOCTYPE html>
          <html>
          <head>
            <meta http-equiv="refresh" content="0; url=https://maaser-tracker-335aa.web.app/">
            <title>Redirecting...</title>
          </head>
          <body>
            <p>Redirecting to <a href="https://maaser-tracker-335aa.web.app/">Ma'aser Tracker</a>...</p>
          </body>
          </html>
          REDIRECT_EOF
            touch .nojekyll
            git add index.html .nojekyll
          fi

          # Deploy PR preview subfolder
          rm -rf "pr-${PR_NUM}"
          mkdir -p "pr-${PR_NUM}"
          cp -r /tmp/preview-build/* "pr-${PR_NUM}/"

          git add "pr-${PR_NUM}/"
          git commit -m "Preview for PR #${PR_NUM}" --allow-empty
          git push origin gh-pages

          git checkout -
      - name: Comment PR with preview URL
        uses: actions/github-script@v7
        with:
          script: |
            const prNum = context.payload.pull_request.number;
            const repo = context.repo.repo;
            const owner = context.repo.owner;
            const url = `https://${owner}.github.io/${repo}/pr-${prNum}/`;
            await github.rest.issues.createComment({
              owner, repo, issue_number: prNum,
              body: `## PR Preview\n\n**URL:** ${url}\n\nThis preview will be removed when the PR is closed.`
            });
